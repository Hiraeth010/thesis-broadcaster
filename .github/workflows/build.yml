name: build

# SEA cannot cross-compile, so each binary is built on its own runner.
# Tag a release (v0.1.0) to publish them; pushes just check the build works.
on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: thesis-broadcaster-windows
            file: build/thesis-broadcaster.exe
          - os: macos-latest
            artifact: thesis-broadcaster-macos
            file: build/thesis-broadcaster
          - os: ubuntu-latest
            artifact: thesis-broadcaster-linux
            file: build/thesis-broadcaster

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Smoke test the binary
        shell: bash
        run: |
          # A binary that builds but can't boot is worse than no binary.
          NO_OPEN=1 PORT=3099 "${{ matrix.file }}" &
          PID=$!
          sleep 6
          curl -sf http://localhost:3099/api/status > /dev/null || { echo "API did not respond"; kill $PID; exit 1; }
          curl -sf http://localhost:3099/ | grep -q "thesis broadcaster" || { echo "dashboard asset missing"; kill $PID; exit 1; }
          echo "binary boots and serves"
          kill $PID

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.file }}

  # Autostart can only be honestly tested on a real machine of each OS, and CI
  # runners are exactly that. Non-blocking: this reports whether the macOS and
  # Linux paths work, it does not gate the release.
  autostart:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: install -> status -> uninstall
        shell: bash
        run: |
          set -x
          echo "--- before ---"
          node src/server.js --status

          echo "--- install ---"
          node src/server.js --install || { echo "INSTALL FAILED"; exit 1; }

          echo "--- status (want ON) ---"
          node src/server.js --status | tee /tmp/st.txt
          grep -q "ON" /tmp/st.txt || { echo "STATUS DID NOT REPORT ON"; exit 1; }

          echo "--- is it actually serving? ---"
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3031/api/status > /dev/null; then echo "SERVING"; break; fi
            sleep 2
          done
          curl -sf http://localhost:3031/api/status > /dev/null || echo "WARNING: registered but never served"

          echo "--- native view ---"
          case "${{ matrix.os }}" in
            macos-latest)  launchctl list | grep -i thesis || echo "not in launchctl list" ;;
            ubuntu-latest) systemctl --user status thesis-broadcaster --no-pager || echo "systemctl --user unavailable" ;;
            windows-latest) schtasks //Query //TN ThesisBroadcaster || true ;;
          esac

          echo "--- uninstall ---"
          node src/server.js --uninstall || { echo "UNINSTALL FAILED"; exit 1; }
          node src/server.js --status | tee /tmp/st2.txt
          grep -q "OFF" /tmp/st2.txt || { echo "STILL ON AFTER UNINSTALL"; exit 1; }
          echo "AUTOSTART OK on ${{ matrix.os }}"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Rename per platform
        run: |
          mkdir -p out
          mv dist/thesis-broadcaster-windows/thesis-broadcaster.exe out/thesis-broadcaster-windows.exe
          mv dist/thesis-broadcaster-macos/thesis-broadcaster out/thesis-broadcaster-macos
          mv dist/thesis-broadcaster-linux/thesis-broadcaster out/thesis-broadcaster-linux
          chmod +x out/thesis-broadcaster-macos out/thesis-broadcaster-linux
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
