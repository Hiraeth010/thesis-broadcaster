name: test

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Unit + integration tests
        run: npm test

      - name: Manifest and module graph
        run: node tests/manifest.test.mjs

  package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Zip the extension
        run: |
          cd extension
          zip -r ../thesis-broadcaster.zip . -x '*.DS_Store'
      - uses: softprops/action-gh-release@v2
        with:
          files: thesis-broadcaster.zip
          generate_release_notes: true
